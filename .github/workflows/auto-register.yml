name: OpenAI Auto Register

on:
  schedule:
    # GitHub schedule 可能延迟，避开整点热点分钟更稳定（仍是每5分钟）
    - cron: '2-59/5 * * * *'
  workflow_dispatch:  # 允许手动触发
  push:
    branches:
      - main

jobs:
  register:
    concurrency:
      group: openai-auto-register
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Create account directory
        run: mkdir -p account

      - name: Run registration (15 accounts)
        env:
          PROXY: ${{ secrets.PROXY }}
        run: |
          python ok_openai_register.py --count 15 --once --proxy "$PROXY"
        continue-on-error: true

      - name: Check for new tokens
        id: check
        run: |
          count=$(ls -1 account/token_*.json 2>/dev/null | wc -l)
          echo "token_count=$count" >> $GITHUB_OUTPUT
          echo "Found $count token files"

      - name: Commit new tokens
        if: steps.check.outputs.token_count > 0
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add account/
          git diff --staged --quiet || git commit -m "Add new account tokens - $(date '+%Y-%m-%d %H:%M')"
          git push
